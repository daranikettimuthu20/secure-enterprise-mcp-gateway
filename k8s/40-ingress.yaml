apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mcp-gateway-ingress
  namespace: mcp-gateway
  annotations:
    nginx.ingress.kubernetes.io/rate-limit: "100"          # requests/minute/IP
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts: ["mcp-gateway.yourcompany.com"]
      secretName: mcp-gateway-tls
  rules:
    - host: mcp-gateway.yourcompany.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: mcp-gateway
                port:
                  number: 8080
