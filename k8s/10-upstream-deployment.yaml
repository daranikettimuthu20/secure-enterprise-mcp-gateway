apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-demo-upstream
  namespace: mcp-gateway
  labels:
    app: mcp-demo-upstream
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mcp-demo-upstream
  template:
    metadata:
      labels:
        app: mcp-demo-upstream
        # label used by the NetworkPolicy below to grant only the gateway ingress
        role: mcp-tool-server
    spec:
      containers:
        - name: mcp-demo-upstream
          image: your-registry/mcp-demo-upstream:latest
          ports:
            - containerPort: 9000
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
            limits: { cpu: "200m", memory: "128Mi" }
          securityContext:
            runAsNonRoot: true
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
---
apiVersion: v1
kind: Service
metadata:
  name: mcp-demo-upstream
  namespace: mcp-gateway
spec:
  selector:
    app: mcp-demo-upstream
  ports:
    - port: 9000
      targetPort: 9000
  type: ClusterIP
