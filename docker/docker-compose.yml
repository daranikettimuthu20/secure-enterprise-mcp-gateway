# Local dev / demo environment. Mirrors the isolation model used in k8s:
# the gateway is the only service with a published port; the upstream
# MCP server is reachable only on the internal network, gateway -> upstream.
version: "3.9"

services:
  mcp-gateway:
    build:
      context: ..
      dockerfile: docker/Dockerfile.gateway
    ports:
      - "8080:8080"
    environment:
      JWT_SECRET_KEY: "change-me-in-prod"
      UPSTREAM_DEMO_URL: "http://demo-upstream:9000"
      INJECTION_BLOCK_THRESHOLD: "0.6"
      PII_ACTION_DEFAULT: "block"
    depends_on:
      - demo-upstream
    networks:
      - mcp-net

  demo-upstream:
    build:
      context: ..
      dockerfile: docker/Dockerfile.upstream
    # No ports published to the host - only the gateway can reach it,
    # enforced here by network membership and in k8s by NetworkPolicy.
    networks:
      - mcp-net

networks:
  mcp-net:
    driver: bridge
